apply plugin: 'com.android.application'

/**
 * Release Signing Configuration
 *
 * To generate a release keystore, run:
 *   keytool -genkey -v -keystore release.keystore -alias pocket-dating-coach -keyalg RSA -keysize 2048 -validity 10000
 *
 * Signing credentials are loaded from one of two sources (in priority order):
 *   1. A local `keystore.properties` file in the android/ directory (not committed to git)
 *   2. Environment variables: KEYSTORE_PATH, KEYSTORE_ALIAS, KEYSTORE_STORE_PASSWORD, KEYSTORE_KEY_PASSWORD
 *
 * keystore.properties format:
 *   keystorePath=../release.keystore
 *   keystoreAlias=pocket-dating-coach
 *   keystoreStorePassword=your_store_password
 *   keystoreKeyPassword=your_key_password
 */

// Load signing properties from keystore.properties file or environment variables
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystorePath = null
def keystoreAlias = null
def keystoreStorePassword = null
def keystoreKeyPassword = null

if (keystorePropertiesFile.exists()) {
    def keystoreProperties = new Properties()
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    keystorePath = keystoreProperties['keystorePath']
    keystoreAlias = keystoreProperties['keystoreAlias']
    keystoreStorePassword = keystoreProperties['keystoreStorePassword']
    keystoreKeyPassword = keystoreProperties['keystoreKeyPassword']
} else {
    keystorePath = System.getenv("KEYSTORE_PATH")
    keystoreAlias = System.getenv("KEYSTORE_ALIAS")
    keystoreStorePassword = System.getenv("KEYSTORE_STORE_PASSWORD")
    keystoreKeyPassword = System.getenv("KEYSTORE_KEY_PASSWORD")
}

def hasSigningConfig = keystorePath != null && keystoreAlias != null &&
    keystoreStorePassword != null && keystoreKeyPassword != null

android {
    namespace = "com.pocketdatingcoach.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.pocketdatingcoach.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        // Version Management
        // -----------------
        // versionCode (integer): Must be STRICTLY incremented for each Play Store submission.
        // The Play Store uses versionCode to determine update ordering — a new upload must
        // always have a higher versionCode than the previous one, or it will be rejected.
        //
        // versionName (string): Follows semantic versioning (MAJOR.MINOR.PATCH).
        // This is the human-readable version shown to users on the Play Store listing.
        // It does not affect update ordering — only versionCode matters for that.
        versionCode 3
        versionName "1.0.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        if (hasSigningConfig) {
            release {
                storeFile file(keystorePath)
                storePassword keystoreStorePassword
                keyAlias keystoreAlias
                keyPassword keystoreKeyPassword
            }
        }
    }

    buildTypes {
        debug {
            // Debug builds use the default debug keystore (no release signing)
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'

            if (hasSigningConfig) {
                signingConfig signingConfigs.release
            } else {
                // Fail the release build with a clear error if signing is not configured.
                // This prevents accidentally producing unsigned release builds.
                gradle.taskGraph.whenReady { taskGraph ->
                    def hasReleaseBuildTask = taskGraph.allTasks.any { task ->
                        task.name.contains("Release") && !task.name.contains("Debug")
                    }
                    if (hasReleaseBuildTask) {
                        throw new GradleException(
                            "Release signing configuration is missing. " +
                            "Provide signing credentials via a keystore.properties file in the android/ directory " +
                            "or set environment variables: KEYSTORE_PATH, KEYSTORE_ALIAS, KEYSTORE_STORE_PASSWORD, KEYSTORE_KEY_PASSWORD. " +
                            "See the comment at the top of app/build.gradle for details."
                        )
                    }
                }
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
