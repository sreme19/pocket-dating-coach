name: Android Distribution

# Builds Flutter APK and distributes to Firebase App Distribution
# every time code is pushed to development (mobile/ files only).
#
# Testers get a push notification via Firebase App Tester app
# with a download link — no Play Store, no TestFlight needed.
#
# Required GitHub Secrets:
#   FIREBASE_SERVICE_ACCOUNT — Google Cloud service account JSON (Firebase App Distribution Admin)
#   FIREBASE_ANDROID_APP_ID  — 1:239928106804:android:edf3b327f4c86c1b544f61

on:
  push:
    branches:
      - development
    paths:
      - 'mobile/**'
  workflow_dispatch:   # manual trigger from GitHub Actions UI

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ── Java 17 (required by Gradle) ───────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Flutter stable ─────────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: cd mobile && flutter pub get

      # ── Build debug APK ────────────────────────────────────────────────────
      # Debug build — no keystore needed, suitable for internal testing.
      # Switch to --release + signing config when ready for production.
      - name: Build APK (debug)
        run: cd mobile && flutter build apk --debug

      # ── Upload to Firebase App Distribution ────────────────────────────────
      - name: Distribute to testers
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: tester
          file: mobile/build/app/outputs/flutter-apk/app-debug.apk
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}

      # ── Log result to monitor_log ───────────────────────────────────────────
      - name: Log distribution to monitor_log
        if: always()
        run: |
          STATUS=$([ "${{ job.status }}" = "success" ] && echo "OK" || echo "FAIL")
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHA="${{ github.sha }}"
          # NOTE: do not interpolate github.event.head_commit.message into this
          # shell — multi-line / quoted commit messages break the script (exit 127).
          curl -s -o /dev/null \
            -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/monitor_log" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"check_name\":\"android_distribution\",\"status\":\"$STATUS\",\"response_time_ms\":0,\"error_message\":$([ \"$STATUS\" = \"OK\" ] && echo \"null\" || echo \"\\\"Build/distribute failed — $SHA\\\"\"),\"created_at\":\"$NOW\"}"
