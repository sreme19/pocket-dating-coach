name: Health Monitor (5-min)

# Runs every 5 minutes in production.
# Checks: API health ping + Supabase DB read integrity.
# Writes results to monitor_log table.
# Sends CRITICAL email (via Resend) after 3 consecutive failures.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # manual trigger for testing

concurrency:
  group: health-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    env:
      APP_URL:          ${{ secrets.APP_URL }}           # https://riteangle.dating
      SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
      ALERT_EMAIL:      ${{ secrets.ALERT_EMAIL_CRITICAL }}  # chris@wardrobeofamonk.com
      CRON_SECRET:      ${{ secrets.CRON_SECRET }}

    steps:
      # ── 1. API health ping ────────────────────────────────────────────────────
      - name: API health ping
        id: api_ping
        run: |
          START=$(date +%s%3N)
          HTTP=$(curl -s -o /tmp/ping_body.json -w "%{http_code}" \
            --max-time 10 \
            "$APP_URL/api/health")
          END=$(date +%s%3N)
          MS=$(( END - START ))
          echo "http_code=$HTTP" >> $GITHUB_OUTPUT
          echo "response_ms=$MS"   >> $GITHUB_OUTPUT
          if [ "$HTTP" = "200" ]; then
            echo "status=OK"   >> $GITHUB_OUTPUT
          else
            echo "status=FAIL" >> $GITHUB_OUTPUT
            echo "error=HTTP $HTTP" >> $GITHUB_OUTPUT
          fi

      # ── 2. DB read integrity ──────────────────────────────────────────────────
      - name: DB read integrity
        id: db_check
        run: |
          START=$(date +%s%3N)
          HTTP=$(curl -s -o /tmp/db_body.json -w "%{http_code}" \
            --max-time 10 \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/verified_vibe_users?select=id&limit=1")
          END=$(date +%s%3N)
          MS=$(( END - START ))
          echo "http_code=$HTTP" >> $GITHUB_OUTPUT
          echo "response_ms=$MS"   >> $GITHUB_OUTPUT
          if [ "$HTTP" = "200" ]; then
            echo "status=OK"   >> $GITHUB_OUTPUT
          else
            echo "status=FAIL" >> $GITHUB_OUTPUT
            echo "error=HTTP $HTTP — $(cat /tmp/db_body.json)" >> $GITHUB_OUTPUT
          fi

      # ── 3. Write both results to monitor_log ─────────────────────────────────
      - name: Log results to monitor_log
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          log_entry() {
            local check_name=$1
            local status=$2
            local ms=$3
            local error_msg=$4
            curl -s -o /dev/null \
              -X POST "$SUPABASE_URL/rest/v1/monitor_log" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"check_name\":\"$check_name\",\"status\":\"$status\",\"response_time_ms\":$ms,\"error_message\":$([ -z \"$error_msg\" ] && echo 'null' || echo \"\\\"$error_msg\\\"\"),\"created_at\":\"$NOW\"}"
          }

          log_entry "api_health_ping" \
            "${{ steps.api_ping.outputs.status }}" \
            "${{ steps.api_ping.outputs.response_ms }}" \
            "${{ steps.api_ping.outputs.error }}"

          log_entry "db_read_integrity" \
            "${{ steps.db_check.outputs.status }}" \
            "${{ steps.db_check.outputs.response_ms }}" \
            "${{ steps.db_check.outputs.error }}"

      # ── 4. Consecutive failure check + CRITICAL alert ─────────────────────────
      - name: Check consecutive failures & alert
        if: steps.api_ping.outputs.status == 'FAIL' || steps.db_check.outputs.status == 'FAIL'
        run: |
          # Query last 3 results for each failing check
          send_alert() {
            local check_name=$1
            local last_error=$2

            # Count consecutive FAILs (last 3 entries)
            RESULT=$(curl -s \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              "$SUPABASE_URL/rest/v1/monitor_log?check_name=eq.$check_name&order=created_at.desc&limit=3&select=status")

            FAIL_COUNT=$(echo "$RESULT" | python3 -c "
          import sys, json
          rows = json.load(sys.stdin)
          print(sum(1 for r in rows if r['status'] == 'FAIL'))
          ")

            echo "[$check_name] consecutive FAILs: $FAIL_COUNT"
            if [ "$FAIL_COUNT" -lt "3" ]; then
              echo "[$check_name] Retry threshold not reached — no alert sent."
              return
            fi

            # Send CRITICAL email via Resend
            curl -s -X POST "https://api.resend.com/emails" \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"from\": \"PDC Monitor <monitor@riteangle.dating>\",
                \"to\": [\"$ALERT_EMAIL\"],
                \"subject\": \"🔴 CRITICAL: $check_name failed 3× — riteangle.dating\",
                \"html\": \"<p><strong>Check:</strong> $check_name</p><p><strong>Status:</strong> FAIL (3 consecutive)</p><p><strong>Last error:</strong> $last_error</p><p><strong>Time:</strong> $(date -u)</p><p><a href='$APP_URL/admin/monitoring'>View monitoring dashboard</a></p>\"
              }"
            echo "[$check_name] CRITICAL alert sent."
          }

          if [ "${{ steps.api_ping.outputs.status }}" = "FAIL" ]; then
            send_alert "api_health_ping" "${{ steps.api_ping.outputs.error }}"
          fi

          if [ "${{ steps.db_check.outputs.status }}" = "FAIL" ]; then
            send_alert "db_read_integrity" "${{ steps.db_check.outputs.error }}"
          fi
