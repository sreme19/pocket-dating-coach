name: Release

# Automatically creates a GitHub Release whenever the version in
# mobile/pubspec.yaml changes on a push to main.
#
# Flow:
#   1. Developer bumps version in pubspec.yaml (e.g. 1.0.5+15 → 1.0.6+16)
#   2. Commit + push to main (or merge PR)
#   3. This workflow detects the version change
#   4. Creates git tag + GitHub Release with auto-generated changelog

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/pubspec.yaml'   # only runs when version file changes
  workflow_dispatch:            # manual trigger as fallback

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Read version from pubspec.yaml ─────────────────────────────────────
      - name: Read version from pubspec.yaml
        id: version
        run: |
          VERSION="v$(grep '^version:' mobile/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)"
          BUILD=$(grep '^version:' mobile/pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD"     >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION (build $BUILD)"

      # ── Check if tag already exists (skip if already released) ────────────
      - name: Check if release already exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git tag | grep -q "^${VERSION}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $VERSION already exists — skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version $VERSION — will create release"
          fi

      # ── Generate changelog from commits since last tag ─────────────────────
      - name: Generate changelog
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          CURRENT="${{ steps.version.outputs.version }}"
          PREV=$(git tag --sort=-version:refname | head -1)

          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          FEATURES=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep "^- feat" || true)
          FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep "^- fix" || true)
          CHORES=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep "^- chore\|^- ci\|^- docs\|^- refactor" || true)

          {
            echo "## What's Changed"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### ✨ New Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$CHORES" ]; then
              echo "### 🔧 Maintenance"
              echo "$CHORES"
              echo ""
            fi
            if [ -n "$PREV" ]; then
              echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${CURRENT}"
            fi
          } > /tmp/release_notes.md

          cat /tmp/release_notes.md

      # ── Create tag + GitHub Release ────────────────────────────────────────
      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION — riteangle.dating" \
            --notes-file /tmp/release_notes.md \
            --latest
          echo "✅ Released $VERSION"

      # ── Log to monitor_log ─────────────────────────────────────────────────
      - name: Log release to monitor_log
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -s -o /dev/null \
            -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/monitor_log" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"check_name\":\"github_release\",\"status\":\"OK\",\"response_time_ms\":0,\"error_message\":\"Released $VERSION\",\"created_at\":\"$NOW\"}"
